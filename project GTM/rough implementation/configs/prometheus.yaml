# configs/prometheus.yml
# Конфигурация Prometheus для сбора метрик

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "sourcegraph-gtm-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: "/metrics"
    scrape_interval: 30s

  - job_name: "sourcegraph-gtm-celery"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: "/celery-metrics"

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alerts.yml"